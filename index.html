<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Aurora Birthday Website</title>

    <meta name="description"
          content="Interactive Birthday Website">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animation.css">
    <link rel="stylesheet" href="css/responsive.css">

</head>

<body>

    <!-- Background -->
    <div id="background">

    <div class="aurora aurora-1"></div>

    <div class="aurora aurora-2"></div>

    <div class="aurora aurora-3"></div>

    </div>

    <!-- Loading Screen -->
    <section id="loading-screen">

        <div class="loading-card">

            <h1 id="loading-title">
                Happy Birthday 🎂
            </h1>

            <p id="loading-subtitle">
                A Special Gift Made With ❤️
            </p>

            <button id="startButton">

                START

            </button>

        </div>

    </section>

    <!-- Main Website -->
    <main id="app">

        <!-- Aurora Layer -->
        <div id="aurora"></div>

        <!-- Floating Particle -->
<div id="particles"></div>

<!-- Floating Love Words -->
<div id="floating-love"></div>

<!-- Floating Gallery -->
<div id="gallery"></div>

        <!-- Floating Gallery -->
        <div id="gallery"></div>

        <!-- Story -->
        <section id="story">

            <h1 id="title"></h1>

            <p id="subtitle"></p>

            <div id="message"></div>

        </section>
<!-- Love Letter -->

<section id="love-letter" class="hidden">

    <div class="letter-card">

        <h2>💌 For My Lovely Princess</h2>

        <p id="typing-text"></p>

        <span class="typing-cursor">|</span>

        <button id="nextGalleryBtn">

            Continue ❤️

        </button>

    </div>

</section>
        <!-- Memories Gallery -->

<section id="memory-gallery" class="hidden">

    <h2>📸 Our Memories</h2>

    <div class="gallery-card">

        <img
            id="gallery-image"
            src=""
            alt="Memory">

        <p id="gallery-caption"></p>

    </div>

    <div class="gallery-navigation">

        <button id="prevPhoto">

            ←

        </button>

        <button id="nextPhoto">

            →

        </button>

    </div>

</section>
        <section id="ending" class="hidden">

<h1>

I Love You ❤️

</h1>

<p>

Thank you for being part of my life.

Happy Birthday My Lovely Princess.

</p>

        </section>
    </main>

    <!-- Music -->
    <audio
    id="birthdayMusic"
    preload="auto"
    loop>

    <source
        src="assets/music/birthday.mp3"
        type="audio/mpeg">

    </audio>

    <!-- JavaScript -->
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/music.js"></script>
    <script src="js/gallery.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
